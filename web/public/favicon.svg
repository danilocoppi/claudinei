<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Favicon "Divisa": brasão partido na diagonal — metade estrela do Claude
       (terracota sobre creme), metade nó da OpenAI (creme sobre tinta). -->
  <defs>
    <clipPath id="lft"><path d="M0 0 L24 0 L0 24 Z"/></clipPath>
    <clipPath id="rgt"><path d="M24 0 L24 24 L0 24 Z"/></clipPath>
    <clipPath id="badge"><rect width="24" height="24" rx="5"/></clipPath>
    <path id="ray" d="M12 9.4 Q13.9 5.95 12 2.5 Q10.1 5.95 12 9.4 Z"/>
  </defs>
  <g clip-path="url(#badge)">
    <!-- fundos das duas metades -->
    <rect width="24" height="24" fill="#F4EFE7" clip-path="url(#lft)"/>
    <rect width="24" height="24" fill="#26221F" clip-path="url(#rgt)"/>
    <!-- estrela do Claude na metade creme -->
    <g fill="#B5573C" clip-path="url(#lft)">
      <use href="#ray" transform="rotate(0 12 12)"/>
      <use href="#ray" transform="rotate(30 12 12)"/>
      <use href="#ray" transform="rotate(60 12 12)"/>
      <use href="#ray" transform="rotate(90 12 12)"/>
      <use href="#ray" transform="rotate(120 12 12)"/>
      <use href="#ray" transform="rotate(150 12 12)"/>
      <use href="#ray" transform="rotate(180 12 12)"/>
      <use href="#ray" transform="rotate(210 12 12)"/>
      <use href="#ray" transform="rotate(240 12 12)"/>
      <use href="#ray" transform="rotate(270 12 12)"/>
      <use href="#ray" transform="rotate(300 12 12)"/>
      <use href="#ray" transform="rotate(330 12 12)"/>
    </g>
    <!-- nó da OpenAI na metade escura -->
    <g clip-path="url(#rgt)">
      <path fill="#F4EFE7" transform="translate(2.16 2.16) scale(0.82)" d="M22.282 9.821a5.985 5.985 0 0 0-.516-4.91 6.046 6.046 0 0 0-6.51-2.9A6.065 6.065 0 0 0 4.981 4.18a5.985 5.985 0 0 0-3.998 2.9 6.046 6.046 0 0 0 .743 7.097 5.985 5.985 0 0 0 .51 4.911 6.051 6.051 0 0 0 6.515 2.9A5.985 5.985 0 0 0 13.26 24a6.056 6.056 0 0 0 5.772-4.206 5.99 5.99 0 0 0 3.997-2.9 6.056 6.056 0 0 0-.747-7.073zM13.26 22.43a4.476 4.476 0 0 1-2.876-1.04l.141-.081 4.779-2.758a.795.795 0 0 0 .392-.681v-6.737l2.02 1.168a.071.071 0 0 1 .038.052v5.583a4.504 4.504 0 0 1-4.494 4.494zM3.6 18.304a4.47 4.47 0 0 1-.535-3.014l.142.085 4.783 2.759a.771.771 0 0 0 .78 0l5.843-3.369v2.332a.08.08 0 0 1-.033.062L9.74 22.98a4.5 4.5 0 0 1-6.14-1.646zM2.34 7.896a4.485 4.485 0 0 1 2.366-1.973V11.6a.766.766 0 0 0 .388.676l5.815 3.355-2.02 1.168a.076.076 0 0 1-.071 0l-4.83-2.786A4.504 4.504 0 0 1 2.34 7.872zm16.597 3.855l-5.833-3.387L15.119 7.2a.076.076 0 0 1 .071 0l4.83 2.791a4.494 4.494 0 0 1-.676 8.105v-5.678a.79.79 0 0 0-.407-.667zm2.01-3.023l-.141-.085-4.774-2.782a.776.776 0 0 0-.785 0L9.409 9.23V6.897a.066.066 0 0 1 .028-.061l4.83-2.787a4.5 4.5 0 0 1 6.68 4.66zm-12.64 4.135l-2.02-1.164a.08.08 0 0 1-.038-.057V6.075a4.5 4.5 0 0 1 7.375-3.453l-.142.08-4.778 2.758a.795.795 0 0 0-.393.681zm1.097-2.365l2.602-1.5 2.607 1.5v2.999l-2.597 1.5-2.607-1.5z"/>
    </g>
    <!-- fio da divisa -->
    <path d="M24 0 L0 24" stroke="#26221F" stroke-width="0.5" opacity="0.25"/>
  </g>
</svg>
